<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Aristotle | Socratic Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        /* ... existing styles remain ... */
        .output-box { margin-top: 16px; padding: 20px; background: #fdfdfd; border-left: 5px solid #0071e3; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .socratic-tone { font-family: 'Georgia', serif; font-size: 1.1rem; line-height: 1.6; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Project Aristotle</h1>
        <p class="subtitle">Humanistic Math Tutor</p>

        <textarea id="proof-input" placeholder="e.g., 5 = 5"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="verify-btn" style="flex: 2;">Verify Step</button>
            <button id="demo-btn" style="flex: 1; background: #515154;">Load Example</button>
        </div>
        
        <div id="guidance-output" class="output-box socratic-tone">
            "Welcome. I am Aristotle. Let us examine the logic of your proof together. What step will you take?"
        </div>
    </div>

    <script type="module">
        import { AristotleEngine } from './aristotle.js';
        const engine = new AristotleEngine();
        await engine.initialize();

        const inputField = document.getElementById('proof-input');
        const guidance = document.getElementById('guidance-output');

        document.getElementById('demo-btn').addEventListener('click', () => {
            inputField.value = "5 = 5";
        });

        document.getElementById('verify-btn').addEventListener('click', async () => {
            const m = await engine.evaluateProofStep(inputField.value);
            
            // Socratic Personality Mapping
            if (m.isValid) {
                guidance.innerText = m.probability > 0.9 
                    ? "Excellent. You have identified a sound logical step. How do you intend to proceed from here?"
                    : "That holds up mathematically, though we should double-check the premises. Is there a more elegant way to express this?";
            } else {
                guidance.innerText = m.probability < 0.2
                    ? "I am struggling to follow that reasoning. If we examine the balance of the equation, does this step truly maintain equality?"
                    : "That step seems to stray from the logical path. Could you explain the intuition behind that transformation?";
            }
        });
    </script>
</body>
</html>
