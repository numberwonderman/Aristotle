<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aristotle</title>
    <style>
        :root { --bg: #ffffff; --text: #1d1d1f; --accent: #0071e3; --border: #d2d2d7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding-top: 40px; }
        .container { width: 100%; max-width: 480px; padding: 20px; display: flex; flex-direction: column; align-items: center;}
        
        /* Logo Styling */
        .app-logo { width: 80px; height: 80px; margin-bottom: 16px; object-fit: contain; }
        
        h1 { font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 8px; color: var(--text); font-weight: 700;}
        .subtitle { font-size: 0.9rem; color: #86868b; margin-bottom: 24px; }

        .stats-row { width: 100%; display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .stat { display: flex; flex-direction: column; text-align: center; }
        .stat-label { font-size: 0.65rem; color: #86868b; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-val { font-size: 1.1rem; font-weight: 600; margin-top: 2px; }

        textarea { width: 100%; height: 120px; padding: 16px; border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 1rem; margin-bottom: 12px; outline: none; transition: border 0.2s; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;}
        textarea:focus { border-color: var(--accent); }

        .btn-group { width: 100%; display: flex; gap: 8px; margin-bottom: 24px;}
        button { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-size: 1rem;}
        #verify-btn { background: var(--accent); color: white; }
        #verify-btn:active { opacity: 0.8; }
        #demo-btn { background: #f5f5f7; color: #1d1d1f; }
        #demo-btn:active { background: #e8e8ed; }
        
        .guidance { width: 100%; font-size: 1.05rem; line-height: 1.5; color: #424245; padding: 20px; background: #fbfbfd; border-radius: 12px; border: 1px solid #f2f2f7;}
    </style>
</head>
<body>
    <div class="container">
        <!-- Your existing logo.png is loaded here -->
        <img src="logo.png" alt="Aristotle Logo" class="app-logo">
        
        <h1>Project Aristotle</h1>
        <p class="subtitle">Hybrid Intellectual Guide</p>
        
        <div class="stats-row">
            <div class="stat"><div class="stat-label">Latency</div><div class="stat-val" id="bench-latency">--</div></div>
            <div class="stat"><div class="stat-label">Confidence</div><div class="stat-val" id="bench-conf">--</div></div>
        </div>

        <textarea id="proof-input" placeholder="Enter your algebraic step..."></textarea>
        <div class="btn-group">
            <button id="verify-btn">Verify Step</button>
            <button id="demo-btn">Load Example</button>
        </div>
        
        <div id="guidance-output" class="guidance">
            "I am ready. Show me the first step of your proof."
        </div>
    </div>

    <script type="module">
        import { AristotleEngine } from './aristotle.js';
        const engine = new AristotleEngine();
        // Ensure this initializes correctly against your .onnx file
        await engine.initialize().catch(err => console.error(err));

        const input = document.getElementById('proof-input');
        const guidance = document.getElementById('guidance-output');

        // Demo button now loads the complex expression we discussed
        document.getElementById('demo-btn').onclick = () => input.value = "x + 5 = 15";
        
        document.getElementById('verify-btn').onclick = async () => {
            if (!engine.isReady) return;
            const m = await engine.evaluateProofStep(input.value);
            
            // Update UI Stats
            document.getElementById('bench-latency').innerText = `${m.latency.toFixed(0)}ms`;
            document.getElementById('bench-conf').innerText = `${(m.probability * 100).toFixed(0)}%`;
            
            // Socratic Personality Logic
            if (m.isValid) {
                guidance.innerText = m.probability > 0.95
                    ? "Precisely. That step is logically sound. How do you plan to isolate the variable next?"
                    : "That holds true, but perhaps we can simplify the premise. Is there a more direct path to equality?";
            } else {
                guidance.innerText = m.probability < 0.15
                    ? "I am afraid that reasoning does not maintain equality. If we add 5 to one side, what must we do to the other?"
                    : "That step seems to introduce an inconsistency. Let's re-examine the balance of the equation." ;
            }
        };
    </script>
</body>
</html>
