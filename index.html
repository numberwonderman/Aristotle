<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Aristotle</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        
        .logo { width: 80px; height: 80px; margin: 0 auto 16px; display: block; object-fit: contain; }
        h1 { font-size: 1.4rem; margin: 0 0 5px 0; }
        #status-badge { font-size: 0.7rem; color: #86868b; margin-bottom: 20px; font-weight: 600; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 10px; }
        .stat-item { font-size: 0.8rem; color: #555; }
        
        textarea { width: 100%; height: 100px; margin-bottom: 15px; padding: 15px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #verify-btn { background: #0071e3; color: white; }
        #demo-btn { background: #e5e5ea; }
        
        .guidance { padding: 15px; background: #f0f7ff; border-left: 4px solid #0071e3; text-align: left; font-style: italic; color: #333; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Aristotle Logo" class="logo">
    <h1>Project Aristotle</h1>
    <div id="status-badge">● System initializing...</div>
    
    <div class="stats">
        <div class="stat-item">Latency: <span id="bench-latency">--</span></div>
        <div class="stat-item">Confidence: <span id="bench-conf">--</span></div>
    </div>

    <textarea id="proof-input" placeholder="e.g., x + 5 = 15"></textarea>
    
    <div class="btn-group">
        <button id="verify-btn">Verify Step</button>
        <button id="demo-btn">Load Example</button>
    </div>
    
    <div id="guidance-output" class="guidance">
        "I am Aristotle. Let us examine the logic of your proof together."
    </div>
</div>

<!-- Load Runtime -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<script type="module">
    import { AristotleEngine } from './aristotle.js';

    // We create a wrapper to ensure 'ort' is available globally
    async function initApp() {
        // Double-check if ort loaded
        if (typeof ort === 'undefined') {
            console.error("ONNX Runtime failed to load. Check your internet or ad-blocker.");
            return;
        }

        const statusBadge = document.getElementById('status-badge');
        const engine = new AristotleEngine();
        
        try {
            await engine.initialize();
            statusBadge.innerText = "● Engine Ready";
            statusBadge.style.color = "#34c759";
        } catch (err) {
            statusBadge.innerText = "● Engine Failed";
            statusBadge.style.color = "#ff3b30";
        }

        const input = document.getElementById('proof-input');
        const guidance = document.getElementById('guidance-output');

        document.getElementById('demo-btn').onclick = () => input.value = "x + 5 = 15";

        document.getElementById('verify-btn').onclick = async () => {
            const m = await engine.evaluateProofStep(input.value);
            document.getElementById('bench-latency').innerText = `${m.latency.toFixed(0)}ms`;
            document.getElementById('bench-conf').innerText = `${(m.probability * 100).toFixed(0)}%`;
            guidance.innerText = m.isValid ? "That step holds." : "Let's re-examine that step.";
        };
    }

    initApp();
</script>
</body>
</html>
